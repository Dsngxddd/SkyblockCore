# Island settings menu (/island settings).
# Status lines use PlaceholderAPI placeholders provided by this plugin:
#   %skyblock_flag_pvp%, %skyblock_flag_mob_spawning%, %skyblock_visitors%, ...
# (The internal {flag_pvp} form still works too if you prefer it.)
title: "&8Island Settings"
rows: 4
type: normal

items:
  info:
    slot: 4
    material: PLAYER_HEAD
    name: "&aYour Island"
    lore:
      - "&7Level: &e%skyblock_level%"
      - "&7Points: &e%skyblock_points%"
      - "&7Members: &e%skyblock_members%&7/&e%skyblock_team_limit%"

  pvp:
    slot: 10
    material: DIAMOND_SWORD
    name: "&ePvP"
    lore:
      - "&7Status: %skyblock_flag_pvp%"
      - "&eClick to toggle."
    action: "flag:PVP"

  mob:
    slot: 11
    material: ZOMBIE_HEAD
    name: "&eMob Spawning"
    lore:
      - "&7Status: %skyblock_flag_mob_spawning%"
      - "&eClick to toggle."
    action: "flag:MOB_SPAWNING"

  creeper:
    slot: 12
    material: CREEPER_HEAD
    name: "&eCreeper Explosions"
    lore:
      - "&7Status: %skyblock_flag_creeper_explosion%"
      - "&eClick to toggle."
    action: "flag:CREEPER_EXPLOSION"

  tnt:
    slot: 13
    material: TNT
    name: "&eTNT Explosions"
    lore:
      - "&7Status: %skyblock_flag_tnt_explosion%"
      - "&eClick to toggle."
    action: "flag:TNT_EXPLOSION"

  fire:
    slot: 14
    material: FLINT_AND_STEEL
    name: "&eFire Spread"
    lore:
      - "&7Status: %skyblock_flag_fire_spread%"
      - "&eClick to toggle."
    action: "flag:FIRE_SPREAD"

  visitor-interact:
    slot: 15
    material: OAK_DOOR
    name: "&eVisitor Interaction"
    lore:
      - "&7Status: %skyblock_flag_visitor_interact%"
      - "&7(Opening chests / picking up items)"
      - "&eClick to toggle."
    action: "flag:VISITOR_INTERACT"

  visit:
    slot: 16
    material: IRON_DOOR
    name: "&eVisitors"
    lore:
      - "&7Status: %skyblock_visitors%"
      - "&7Open or close your island to visitors."
      - "&eClick to toggle."
    action: "toggle-lock"

  time:
    slot: 22
    material: CLOCK
    name: "&bIsland Time"
    lore:
      - "&7Locks your island's time so the sun"
      - "&7stays at the chosen moment."
      - ""
      - "&7Current: {time}"
      - ""
      - "&dRequires permission (skyblock.time)."
      - "&eClick to switch to the next time!"
    action: "time"

  back:
    slot: 31
    material: ARROW
    name: "&cBack"
    action: "open:main"
