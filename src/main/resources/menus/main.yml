# Ana ada menüsü — /ada
title: "&8Ada Menüsü"
rows: 3
type: normal

items:
  bilgi:
    slot: 4
    material: PLAYER_HEAD
    name: "&aAdan"
    lore:
      - "&7Sahip: &f{owner}"
      - "&7Seviye: &e{level}"
      - "&7Puan: &e{points}"
      - "&7Sonraki seviye: &e{next_points}"
      - "&7Üyeler: &e{members}&7/&e{team_limit}"

  git:
    slot: 10
    material: GRASS_BLOCK
    name: "&aAda Teleport"
    lore:
      - "&eAdana ışınlanmak için tıkla!"
    action: "island:git"

  olustur:
    slot: 11
    material: NETHER_STAR
    name: "&aAda Oluştur"
    lore:
      - "&7Yeni bir ada kur."
    action: "island:oluştur"

  ayarlar:
    slot: 12
    material: COMPARATOR
    name: "&eAyarlar"
    lore:
      - "&eAda ayarlarını değiştirmek için tıkla!"
    action: "open:settings"

  yukseltme:
    slot: 13
    material: EXPERIENCE_BOTTLE
    name: "&bAda Yükseltme Menüsü"
    lore:
      - "&eYükseltmeler için tıkla!"
    action: "open:upgrades"

  bloklevelleri:
    slot: 14
    material: GOLD_BLOCK
    name: "&6Blok Levelleri"
    block-values: true

  yardim:
    slot: 15
    material: BOOK
    name: "&aYardım & Komutlar"
    lore:
      - "&7Komut listesini gör."
    action: "open:help"

  sil:
    slot: 16
    material: BARRIER
    name: "&cAda Sil"
    lore:
      - "&7Adanı kalıcı olarak sil."
    action: "island:sil"

  kapat:
    slot: 22
    material: ARROW
    name: "&cKapat"
    action: "close"

block-values-format: "&7• &f{block}: &e{value}"
